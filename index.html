<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carta de Amor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #ffb6d9 0%, #ffc0e5 100%);
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        .container {
            perspective: 1000px;
            position: relative;
            z-index: 10;
        }

        .carta {
            width: 280px;
            height: 200px;
            background: #ffffff;
            border: 2px solid #ff69b4;
            border-radius: 5px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            cursor: pointer;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            position: relative;
        }

        .carta.abierta {
            transform: rotateY(180deg);
        }

        .carta-frente,
        .carta-detras {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            backface-visibility: hidden;
            padding: 20px;
            text-align: center;
        }

        .carta-frente {
            background: linear-gradient(135deg, #ffc0e5 0%, #ffb6d9 100%);
            border-radius: 5px;
        }

        .carta-detras {
            background: #ffffff;
            transform: rotateY(180deg);
            border-radius: 5px;
        }

        .carta-frente h1 {
            font-size: 2em;
            color: #ff1493;
        }

        .carta-frente p {
            font-size: 0.9em;
            color: #ff1493;
            font-style: italic;
        }

        .mensaje {
            font-size: 1em;
            color: #d63031;
            line-height: 1.6;
            font-style: italic;
            font-weight: bold;
        }

        .decoracion {
            font-size: 1.2em;
            margin-top: 15px;
        }

        .corazon {
            position: fixed;
            pointer-events: none;
            font-size: 1.5em;
            animation: caer 3s forwards;
            z-index: 1;
        }

        @keyframes caer {
            to {
                transform: translateY(100vh) rotateZ(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="carta" onclick="abrirCarta(this)">
            <!-- Frente de la carta -->
            <div class="carta-frente">
                <h1>💌</h1>
                <p>Abre aquí</p>
            </div>

            <!-- Atrás (interior) de la carta -->
            <div class="carta-detras">
                <div class="mensaje">
                    Te amo mi amir linda, espero que siempre lo tengas presente
                </div>
                <div class="decoracion">
                    ❤️ 💕 ❤️
                </div>
            </div>
        </div>
    </div>

    <script>
        function abrirCarta(elemento) {
            elemento.classList.toggle('abierta');
            if (elemento.classList.contains('abierta')) {
                crearCorazones();
            }
        }

        function crearCorazones() {
            const corazones = ['❤️', '💕', '💗', '💖', '💝'];
            for (let i = 0; i < 30; i++) {
                setTimeout(() => {
                    const corazon = document.createElement('div');
                    corazon.className = 'corazon';
                    corazon.textContent = corazones[Math.floor(Math.random() * corazones.length)];
                    corazon.style.left = Math.random() * window.innerWidth + 'px';
                    document.body.appendChild(corazon);
                    
                    setTimeout(() => corazon.remove(), 3000);
                }, i * 100);
            }
        }
    </script>
</body>
</html>
